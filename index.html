    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          if (item === null || item === "undefined") return initialValue;
          const parsed = JSON.parse(item);
          return parsed !== null ? parsed : initialValue;
        } catch (error) {
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.warn("儲存 LocalStorage 發生錯誤:", error);
        }
      };
      return [storedValue, setValue];
    }

    const compressImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            const maxSize = 400;

            if (width > height) {
              if (width > maxSize) { height *= maxSize / width; width = maxSize; }
            } else {
              if (height > maxSize) { width *= maxSize / height; height = maxSize; }
            }

            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); 
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function TeacherDashboard({ onClose, db, appId, currentClassId }) {
      const [records, setRecords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filterClass, setFilterClass] = useState(currentClassId || 'all');

      const handleDeleteRecord = async (recordId, className, groupName) => {
        if (window.confirm(`⚠️ 警告：確定要刪除「${className} 班 - ${groupName}」的所有資料嗎？\n刪除後將無法復原！`)) {
          try {
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('animal_records').doc(recordId).delete();
            setRecords(prevRecords => prevRecords.filter(r => r.id !== recordId));
          } catch (err) {
            console.error("刪除失敗:", err);
            alert("刪除失敗，請檢查網路狀態或權限！");
          }
        }
      };

      const fetchRecords = async () => {
        setLoading(true);
        try {
          const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('animal_records').get();
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => {
             const classA = a.teamProfile?.classId || 0;
             const classB = b.teamProfile?.classId || 0;
             if (classA !== classB) return classA - classB;
             return (a.teamProfile?.groupId || 0) - (b.teamProfile?.groupId || 0);
          });
          setRecords(data);
        } catch (err) {
          console.error(err);
          alert("獲取資料失敗，請檢查網路狀態！");
        }
        setLoading(false);
      };

      useEffect(() => { fetchRecords(); }, []);

      const displayedRecords = filterClass === 'all' ? records : records.filter(r => r.teamProfile?.classId === Number(filterClass));
      const availableClasses = [...new Set(records.map(r => r.teamProfile?.classId))].filter(Boolean).sort();

        <div className="fixed inset-0 z-[100] bg-slate-100 flex flex-col animate-fadeIn overflow-hidden">

              <div className="flex items-center gap-2 bg-slate-700 rounded-lg px-3 py-2 border border-slate-600">

              </div>
              <button onClick={fetchRecords} className="bg-blue-600 hover:bg-blue-500 px-3 py-2 md:px-5 md:py-2 rounded-lg font-bold transition shadow-sm">重新整理</button>
              <button onClick={onClose} className="bg-red-600 hover:bg-red-500 px-3 py-2 md:px-5 md:py-2 rounded-lg font-bold transition shadow-sm">離開後台</button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 md:p-8 relative">
            {loading ? (
              <div className="absolute inset-0 flex justify-center items-center bg-slate-100/80 z-10">
                <div className="text-2xl font-bold text-slate-600 bg-white px-8 py-4 rounded-2xl shadow-lg">載入雲端資料中...</div>
              </div>
            ) : displayedRecords.length === 0 ? (
              <div className="text-center text-slate-500 text-2xl font-bold mt-20">目前還沒有該班級的資料喔！</div>
            ) : (
              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                {displayedRecords.map(record => {
                  // 防呆安全存取
                  const noPhotoCats = ['刺絲胞', '扁形', '棘皮'];
                  const invertTasks = Array.isArray(record.invertState?.explorationTasks) ? record.invertState.explorationTasks : [];
                  const vertTasks = Array.isArray(record.vertState?.explorationTasks) ? record.vertState.explorationTasks : [];
                  
                  const completedInvertTasks = invertTasks.filter(t => t && (noPhotoCats.includes(t.categoryName) ? (t.selectedFeatures && t.selectedFeatures.length > 0) : t.photo));
                  const completedVertTasks = vertTasks.filter(t => t && t.photo);
                  const allCompletedTasks = [...completedInvertTasks, ...completedVertTasks];
                  
                  const invertScore = record.invertState?.quizState?.isSubmitted ? record.invertState.quizState.score : 0;
                  const vertScore = record.vertState?.quizState?.isSubmitted ? record.vertState.quizState.score : 0;
                  const totalScore = invertScore + vertScore;
                  const isBothSubmitted = record.invertState?.quizState?.isSubmitted && record.vertState?.quizState?.isSubmitted;
                  const seatString = Array.isArray(record.teamProfile?.seatNumbers) ? record.teamProfile.seatNumbers.filter(s=>s).join(', ') : '無';

                  return (

                      <div className="bg-slate-100 px-5 py-3 border-b border-slate-200 flex justify-between items-center">
                        <div className="font-black text-xl text-slate-800 flex items-center gap-2">
                          <span className="bg-indigo-600 text-white text-sm px-2 py-1 rounded-md">{record.teamProfile?.classId} 班</span>
                          {record.teamProfile?.groupId === 99 ? '老師組' : `第 ${record.teamProfile?.groupId} 組`}

                        <div className="flex items-center gap-2">
                          <div className="text-sm font-bold text-slate-600 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
                            座號: {seatString || '無'}

                          <button onClick={() => handleDeleteRecord(record.id, record.teamProfile?.classId, record.teamProfile?.groupId === 99 ? '老師組' : `第 ${record.teamProfile?.groupId} 組`)} className="text-red-400 hover:text-white hover:bg-red-500 p-1.5 rounded-lg transition-colors border border-transparent hover:border-red-600 shadow-sm" title="刪除此筆資料">🗑️</button>
                        </div>
                      </div>
                      
                      <div className="p-5 flex flex-col gap-5">

                            <span className="text-2xl md:text-3xl font-black text-green-600">
                              {isBothSubmitted ? totalScore : (record.invertState?.quizState?.isSubmitted || record.vertState?.quizState?.isSubmitted ? `${totalScore} (未全交)` : '未交卷')}
                            </span>
                          </div>
                          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 flex flex-col items-center justify-center">
                            <span className="text-blue-800 font-bold text-xs md:text-sm mb-1">尋寶任務完成數</span>
                            <span className="text-2xl md:text-3xl font-black text-blue-600">
                              {allCompletedTasks.length} <span className="text-lg">/ 11</span>
                            </span>
                          </div>

                            <span className="text-purple-800 font-bold text-xs md:text-sm mb-1">最後上傳時間</span>
                            <span className="text-sm md:text-base font-bold text-purple-600">
                              {record.lastUpdated?.split(' ')[1] || '無紀錄'}
                            </span>
                          </div>
                        </div>

                        <div>
                          <h4 className="font-bold text-slate-700 mb-3 border-b-2 border-slate-100 pb-2">📷 尋寶任務檢核</h4>
                          {allCompletedTasks.length > 0 ? (
                            <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar items-start">
                              {allCompletedTasks.map((task, idx) => {
                                const isNoPhoto = noPhotoCats.includes(task.categoryName);
                                return (
                                  <div key={idx} className="flex-col items-start shrink-0 w-48 border-2 border-slate-100 rounded-xl overflow-hidden shadow-sm bg-white">
                                    <div className="bg-slate-100 text-center py-1.5 text-sm font-bold text-slate-700 border-b border-slate-200">{task.categoryName}</div>
                                    {isNoPhoto ? (
                                        <div className="w-full h-32 bg-slate-50 flex items-center justify-center p-3 text-center text-slate-500 font-bold text-sm">
                                            無需拍照<br/>已完成特徵勾選✅
                                        </div>
                                    ) : (
                                        <img src={task.photo} alt={task.categoryName} className="w-full h-32 object-cover cursor-pointer hover:opacity-80" onClick={() => window.open(task.photo)} />
                                    )}
                                    <div className="p-2 text-xs text-slate-600 bg-slate-50 border-t border-slate-100 text-center font-bold">
                                      標記特徵 ({task.selectedFeatures?.length || 0}項)
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          ) : (
                            <div className="text-slate-400 text-sm italic bg-slate-50 rounded-lg p-3 text-center border border-dashed border-slate-200">尚未有尋寶進度</div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </main>
        </div>
      );
    }

    function TeamProfileModal({ profile, onSave, onCancel, canCancel, isRestoring }) {
      const CLASSES = Array.from({ length: 13 }, (_, i) => 701 + i);
      const GROUPS = Array.from({ length: 14 }, (_, i) => i + 1);

      const [classId, setClassId] = useState(profile?.classId || 701);
      const [groupId, setGroupId] = useState(profile?.groupId || 1);
      const safeSeatNumbers = Array.isArray(profile?.seatNumbers) ? profile.seatNumbers : Array(4).fill('');
      const [memberCount, setMemberCount] = useState(safeSeatNumbers.length || 4);
      const [seatNumbers, setSeatNumbers] = useState(safeSeatNumbers);
      const [errorMsg, setErrorMsg] = useState('');
      const [teacherPwd, setTeacherPwd] = useState('');

      const isTeacher = groupId === 99;

      const handleMemberCountChange = (e) => {
        const count = parseInt(e.target.value, 10);
        setMemberCount(count);
        setSeatNumbers(prev => {
          const newSeats = [...prev];
          while (newSeats.length < count) newSeats.push('');
          return newSeats.slice(0, count);
        });
      };

      const handleSeatChange = (index, value) => {
        const newSeats = [...seatNumbers];
        newSeats[index] = value;
        setSeatNumbers(newSeats);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (isTeacher) {
          if (teacherPwd !== '8888') {
            setErrorMsg("教師密碼錯誤！無法登入。");
            setTimeout(() => setErrorMsg(''), 3000);
            return;
          }
          setErrorMsg('');
          onSave({ classId, groupId, seatNumbers: ['老師'] });
        } else {
          // 極致防呆：確保陣列內的元素就算不是字串也不會報錯
          if (seatNumbers.some(seat => !String(seat || '').trim())) {
            setErrorMsg("請填寫所有組員的座號喔！");
            setTimeout(() => setErrorMsg(''), 3000);
            return;
          }
          setErrorMsg('');
          onSave({ classId, groupId, seatNumbers });
        }

                  <label className="block font-bold mb-1 text-slate-700">選擇班級</label>

                  </select>
                </div>
                <div>
                  <label className="block font-bold mb-1 text-slate-700">選擇組別</label>
                  <select value={groupId} onChange={e => {setGroupId(Number(e.target.value)); setErrorMsg(''); setTeacherPwd('');}} disabled={isRestoring} className="w-full p-3 border-2 border-slate-200 rounded-lg focus:ring-0 text-lg font-bold text-slate-700 cursor-pointer disabled:opacity-50 focus:border-slate-500 bg-slate-50">
                    {GROUPS.map(g => <option key={g} value={g}>第 {g} 組</option>)}
                    <option value={99} className="font-bold text-indigo-600">老師組</option>
                  </select>
                </div>
              </div>
              
              {!isTeacher ? (
                <>
                  <div className="animate-fadeIn">
                    <label className="block text-slate-700 font-bold mb-1">小組人數</label>
                    <select value={memberCount} onChange={handleMemberCountChange} disabled={isRestoring} className="w-full p-3 border-2 border-slate-200 rounded-lg focus:border-slate-500 focus:ring-0 text-lg font-bold text-slate-700 bg-slate-50 cursor-pointer disabled:opacity-50">

                    <label className="block text-slate-700 font-bold mb-2">輸入組員座號</label>
                    <div className="grid grid-cols-3 gap-3">

                {canCancel && <button type="button" onClick={onCancel} disabled={isRestoring} className="flex-1 py-3 px-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors disabled:opacity-50">取消</button>}

              </div>
            </form>
          </div>
        </div>
      );
    }

      return (
        <div className="flex justify-center my-6 animate-fadeIn relative z-20">
          <div className="bg-slate-200/80 backdrop-blur-md p-1.5 rounded-full flex shadow-inner border border-slate-300">
            <button
              onClick={() => onThemeChange('invert')}
              className={`px-5 py-2.5 md:px-8 md:py-3 rounded-full font-black transition-all duration-300 flex items-center gap-2 ${currentTheme === 'invert' ? 'bg-amber-500 text-amber-950 shadow-md scale-105 transform' : 'text-slate-500 hover:bg-slate-300/50 hover:text-slate-700'}`}
            >
              <span className="text-lg md:text-xl">🐛</span> 
              <span className="text-sm md:text-base">無脊椎動物區</span>
            </button>
            <button
              onClick={() => onThemeChange('vert')}
              className={`px-5 py-2.5 md:px-8 md:py-3 rounded-full font-black transition-all duration-300 flex items-center gap-2 ${currentTheme === 'vert' ? 'bg-blue-500 text-blue-950 shadow-md scale-105 transform' : 'text-slate-500 hover:bg-slate-300/50 hover:text-slate-700'}`}

            </button>
          </div>
        </div>
      );
    }

      const activeClass = theme === 'invert' 
        ? 'bg-amber-500 text-amber-950 shadow-inner rounded-t-xl' 
        : 'bg-blue-600 text-white shadow-inner rounded-t-xl';
      const inactiveClass = `bg-white text-slate-500 hover:bg-${themeColor}-50`;

      return (
        <button onClick={() => setActiveTab(id)} className={`flex-1 py-4 px-1 md:px-2 flex flex-col items-center justify-center gap-2 transition-all duration-300 ${isActive ? activeClass : inactiveClass}`}>
          {icon}
          <span className="font-bold text-xs md:text-lg whitespace-nowrap">{label}</span>
        </button>

    }

                  <h3 className="text-xl font-bold text-amber-800 mb-3 flex items-center gap-2"><span className="text-amber-500 w-6">{INVERT_CATEGORIES[3].icon}</span> 4. 環節動物</h3>

    function MatchingTab({ theme }) {
      const isVert = theme === 'vert';
      const categories = isVert ? VERT_CATEGORIES : INVERT_CATEGORIES;
      const featuresData = isVert ? VERT_FEATURES_DATA : INVERT_FEATURES_DATA;
      const storageKey = `animal_${theme}_matching`;
      
      const [rawMatchingState, setMatchingState] = useLocalStorage(storageKey, null);
      
      // 極致防呆保護
      const state = (rawMatchingState && Array.isArray(rawMatchingState.unmatchedIds) && Array.isArray(rawMatchingState.matchedRecords))
        ? rawMatchingState
        : { unmatchedIds: shuffleArray(featuresData).map(f => f.id), matchedRecords: [] };

      const [selectedFeatureId, setSelectedFeatureId] = useState(null);
      const [feedback, setFeedback] = useState({ show: false, message: '', type: '' });

      const unmatchedFeatures = state.unmatchedIds.map(id => featuresData.find(f => f.id === id)).filter(Boolean);

      const showFeedback = (message, type) => {
        setFeedback({ show: true, message, type });
        setTimeout(() => setFeedback({ show: false, message: '', type: '' }), 2000);
      };

      const handleFeatureClick = (feature) => {
        setSelectedFeatureId(selectedFeatureId === feature.id ? null : feature.id);
      };

      const handleCategoryClick = (categoryName) => {
        if (!selectedFeatureId) return showFeedback('請先點選下方的特徵卡片！', 'warning');
        
        const selectedFeature = featuresData.find(f => f.id === selectedFeatureId);
        if (selectedFeature && selectedFeature.validTargets.includes(categoryName)) {
          setMatchingState({
            unmatchedIds: state.unmatchedIds.filter(id => id !== selectedFeatureId),
            matchedRecords: [...(state.matchedRecords || []), { featureId: selectedFeatureId, category: categoryName }]
          });
          setSelectedFeatureId(null);
          showFeedback('配對成功！🎉', 'success');
        } else {
          setSelectedFeatureId(null);
          showFeedback(selectedFeature ? `答錯囉！「${selectedFeature.text}」不屬於${categoryName}` : '配對失敗', 'error');
        }
      };

      const resetGame = () => { 
        if(window.confirm('確定要重新開始配對遊戲嗎？')) {
          setMatchingState({ unmatchedIds: shuffleArray(featuresData).map(f => f.id), matchedRecords: [] }); 
          setSelectedFeatureId(null); 
        }
      };
      
      const isComplete = unmatchedFeatures.length === 0;
      const themeColor = isVert ? 'blue' : 'amber';

      return (
        <div className="flex flex-col h-full animate-fadeIn">
          {feedback.show && <div className={`fixed top-24 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg text-lg font-bold text-white transition-all ${feedback.type === 'success' ? 'bg-green-500' : feedback.type === 'error' ? 'bg-red-500' : 'bg-slate-700'}`}>{feedback.message}</div>}
          
          <div className="flex justify-between items-center mb-4">
            <h2 className={`text-xl md:text-2xl font-bold text-${themeColor}-800`}>🎮 特徵歸類任務</h2>
            <button onClick={resetGame} className={`px-4 py-2 bg-${themeColor}-100 text-${themeColor}-700 font-bold rounded-lg hover:bg-${themeColor}-200`}>重新開始</button>
          </div>
          
          <div className={`text-${themeColor}-800 bg-white p-3 md:p-4 rounded-xl shadow-sm mb-6 border border-${themeColor}-200 text-sm md:text-base font-medium`}>
            <strong>操作方式：</strong>先點選下方未配對的「特徵卡片」，再點擊上方的「動物類別」進行歸類。
          </div>
          
          {isComplete && (
            <div className="bg-green-100 border-2 border-green-400 p-8 rounded-2xl text-center mb-8 shadow-md">
              <div className="text-5xl mb-4">🏆</div>
              <h3 className="text-2xl md:text-3xl font-black text-green-700 mb-2">恭喜完成配對挑戰！</h3>
              <p className="text-green-600 text-lg font-bold">您已經掌握了{isVert ? '脊椎' : '無脊椎'}動物的關鍵特徵！</p>
            </div>
          )}
          
          <div className={`grid grid-cols-2 md:grid-cols-${categories.length > 5 ? 3 : categories.length} lg:grid-cols-${categories.length} gap-3 md:gap-4 mb-8`}>
            {categories.map(cat => {
              const categoryMatches = (state.matchedRecords || []).filter(m => m.category === cat.name).map(m => featuresData.find(f => f.id === m.featureId)).filter(Boolean);
              const isSelectedTarget = selectedFeatureId !== null;
              
              return (
                <div key={cat.name} onClick={() => handleCategoryClick(cat.name)} className={`flex flex-col min-h-[160px] md:min-h-[200px] border-2 rounded-xl p-3 transition-all cursor-pointer relative overflow-hidden ${isSelectedTarget ? `border-${themeColor}-500 bg-${themeColor}-50 hover:bg-${themeColor}-100 shadow-md transform scale-105` : `border-slate-200 bg-white hover:border-${themeColor}-300`}`}>
                  <div className={`absolute -bottom-4 -right-4 w-24 h-24 opacity-[0.08] pointer-events-none transition-all ${isSelectedTarget ? `text-${themeColor}-700 opacity-20` : 'text-slate-400'}`}>{cat.icon}</div>
                  <div className={`flex items-center justify-center gap-2 mb-3 pb-2 border-b-2 border-${themeColor}-100`}>
                    <span className={`text-${themeColor}-600 w-6 h-6`}>{cat.icon}</span>
                    <h3 className={`text-center font-black text-lg md:text-xl text-${themeColor}-900`}>{cat.name}</h3>
                  </div>
                  <div className="flex-1 flex flex-col gap-2 relative z-10">
                    {categoryMatches.map((record, index) => (
                      <div key={index} className={`bg-${themeColor}-600 text-white text-xs md:text-sm p-2 rounded-lg flex items-center gap-2 shadow-sm font-bold`}>
                        <span className="shrink-0 w-4 h-4">{record.icon}</span><span className="leading-tight">{record.text}</span>
                      </div>
                    ))}
                    {categoryMatches.length === 0 && <div className="text-slate-400 text-center text-sm mt-4 font-bold">等待歸類...</div>}
                  </div>
                </div>
              );
            })}
          </div>
          
          {!isComplete && (
            <div className={`bg-slate-50 p-4 md:p-6 rounded-2xl border border-slate-200 shadow-inner`}>
              <h3 className={`text-lg font-bold text-slate-700 mb-4 border-l-4 border-${themeColor}-500 pl-3`}>
                待分類特徵卡片 ({unmatchedFeatures.length}/{featuresData.length})
              </h3>
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4">
                {unmatchedFeatures.map(feature => (
                  <button key={feature.id} onClick={() => handleFeatureClick(feature)} className={`flex flex-col items-center justify-center p-3 md:p-4 rounded-xl border-2 transition-all shadow-sm text-center min-h-[100px] ${selectedFeatureId === feature.id ? `border-${themeColor}-500 bg-${themeColor}-600 text-white transform -translate-y-1 shadow-lg ring-4 ring-${themeColor}-200` : `border-slate-200 bg-white text-slate-700 hover:border-${themeColor}-400 hover:bg-${themeColor}-50`}`}>
                    <div className={`mb-2 w-6 h-6 ${selectedFeatureId === feature.id ? 'text-white' : `text-${themeColor}-600`}`}>{feature.icon}</div>
                    <span className="font-bold text-sm md:text-sm">{feature.text}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function ExplorationTab({ theme }) {
      const isVert = theme === 'vert';
      const categories = isVert ? VERT_CATEGORIES : INVERT_CATEGORIES;
      const checklist = isVert ? VERT_EXPLORATION_CHECKLIST : INVERT_EXPLORATION_CHECKLIST;
      const storageKey = `animal_${theme}_exploration`;

      const defaultTasks = categories.map(c => ({ categoryName: c.name, photo: null, mapX: null, mapY: null, selectedFeatures: [] }));
      const [rawTasks, setTasks] = useLocalStorage(storageKey, defaultTasks);
      
      // 極致防呆：過濾損壞的資料結構
      const currentTasks = (Array.isArray(rawTasks) && rawTasks.length === categories.length && rawTasks[0] && rawTasks[0].categoryName) 
        ? rawTasks 
        : defaultTasks;

      const [activeTaskIndex, setActiveTaskIndex] = useState(0);
      const activeTask = currentTasks[activeTaskIndex] || currentTasks[0];
      const themeColor = isVert ? 'blue' : 'amber';

      // 特殊無脊椎動物類別判斷 (無需拍照與標記)
      const noPhotoCategories = ['刺絲胞', '扁形', '棘皮'];
      const isNoPhotoCategory = (!isVert) && activeTask && noPhotoCategories.includes(activeTask.categoryName);

      const specialMessages = {
          '刺絲胞': '陸地上沒有刺絲胞動物。',
          '扁形': '有生活在水中及陸地的渦蟲，大觀國中目前沒有發現過。',
          '棘皮': '都生活在海中。'
      };

      const handlePhotoCapture = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const compressedBase64 = await compressImage(file);
        const newTasks = [...currentTasks];
        newTasks[activeTaskIndex].photo = compressedBase64;
        setTasks(newTasks);
      };

      const handleMapClick = (e) => {
        const rect = e.target.getBoundingClientRect();
        const newTasks = [...currentTasks];
        newTasks[activeTaskIndex].mapX = ((e.clientX - rect.left) / rect.width) * 100;
        newTasks[activeTaskIndex].mapY = ((e.clientY - rect.top) / rect.height) * 100;
        setTasks(newTasks);
      };

      const handleFeatureToggle = (featureId) => {
        const newTasks = [...currentTasks];
        const currentSelected = newTasks[activeTaskIndex]?.selectedFeatures || [];
        newTasks[activeTaskIndex] = {
            ...newTasks[activeTaskIndex],
            selectedFeatures: currentSelected.includes(featureId) ? currentSelected.filter(id => id !== featureId) : [...currentSelected, featureId]
        };
        setTasks(newTasks);
      };

      const isTaskComplete = isNoPhotoCategory 
          ? (activeTask.selectedFeatures && activeTask.selectedFeatures.length > 0)
          : (activeTask.photo && activeTask.mapX !== null && activeTask.selectedFeatures && activeTask.selectedFeatures.length > 0);

      const completedTasksCount = currentTasks.filter(t => {
          const isNoPhoto = (!isVert) && t && noPhotoCategories.includes(t.categoryName);
          return isNoPhoto 
            ? (t.selectedFeatures && t.selectedFeatures.length > 0) 
            : (t.photo && t.mapX !== null && t.selectedFeatures && t.selectedFeatures.length > 0);
      }).length;

      return (
        <div className="animate-fadeIn">
          <div className="flex justify-between items-center mb-6">
            <h2 className={`text-2xl md:text-3xl font-extrabold text-${themeColor}-800 flex items-center gap-2`}><span>🔍</span> 校園動物尋寶</h2>
            <div className={`bg-${themeColor}-100 text-${themeColor}-800 font-bold px-4 py-2 rounded-full text-sm md:text-base shadow-sm`}>
              完成進度: {completedTasksCount} / {categories.length}
            </div>
          </div>
          
          <div className="flex gap-2 mb-6 overflow-x-auto pb-2 custom-scrollbar">
            {currentTasks.map((task, index) => {
              const isNoPhotoTask = (!isVert) && task && noPhotoCategories.includes(task.categoryName);
              const isFinished = isNoPhotoTask 
                ? (task.selectedFeatures && task.selectedFeatures.length > 0) 
                : (task.photo && task.mapX !== null && task.selectedFeatures && task.selectedFeatures.length > 0);
              const catIcon = categories.find(c => c.name === task.categoryName)?.icon;
              
              return (
                <button key={task.categoryName || index} onClick={() => setActiveTaskIndex(index)} className={`flex-1 min-w-[80px] md:min-w-[100px] py-3 px-2 rounded-xl border-2 font-bold flex flex-col items-center gap-1 transition-all ${activeTaskIndex === index ? `border-${themeColor}-600 bg-${themeColor}-600 text-white shadow-md` : `border-${themeColor}-200 bg-white text-${themeColor}-700 hover:bg-${themeColor}-50`} ${isFinished && activeTaskIndex !== index ? 'border-green-400 bg-green-50 text-green-700' : ''}`}>
                  <div className="w-6 h-6">{catIcon}</div>
                  <span className="text-sm md:text-base">{task.categoryName}</span>
                  {isFinished && <span className="absolute top-1 right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>}
                </button>
              );
            })}
          </div>
          
          <div className={`bg-white rounded-2xl shadow-md border border-slate-200 p-4 md:p-6 mb-8`}>
            <div className="flex items-center justify-between mb-4 pb-4 border-b border-slate-100">
              <h3 className={`text-lg md:text-xl font-bold text-${themeColor}-800 flex items-center gap-2`}>任務：尋找並記錄一隻「{activeTask.categoryName}」</h3>
              {isTaskComplete && <span className="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-full text-sm shadow-sm border border-green-200">✅ 已完成</span>}
            </div>
            
            <div className="flex flex-col gap-6 md:gap-8">
              
              {isNoPhotoCategory ? (
                /* 無需拍照的專屬提示畫面 */
                <div className={`bg-slate-50 p-6 md:p-10 rounded-xl border border-slate-200 text-center shadow-sm`}>
                    <div className="text-5xl mb-4">💡</div>
                    <p className={`font-black text-xl md:text-2xl text-${themeColor}-800 mb-4 leading-relaxed`}>
                        {specialMessages[activeTask.categoryName]}
                    </p>
                    <p className={`text-base md:text-lg text-slate-600 font-bold bg-${themeColor}-100 px-4 py-3 rounded-lg inline-block border border-${themeColor}-200`}>
                        此類別不需拍照與標記地圖，請直接完成下方特徵勾選即可！
                    </p>
                </div>
              ) : (
                <>
                  {/* 一般分類的拍照與地圖畫面 */}
                  <div className={`bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200`}>
                    <h4 className={`font-bold text-slate-800 mb-4 text-lg border-l-4 border-${themeColor}-500 pl-3`}>📸 1. 拍攝觀察照片</h4>
                    {activeTask.photo ? (
                      <div className={`relative rounded-xl overflow-hidden border-2 border-${themeColor}-300 shadow-sm`}>
                        <img src={activeTask.photo} alt="Student Capture" className="w-full h-64 md:h-96 object-cover" />
                        <label className={`absolute bottom-4 right-4 bg-white/95 text-${themeColor}-800 px-4 py-2 rounded-lg font-black cursor-pointer shadow-lg hover:bg-slate-100 transition-all border border-${themeColor}-200`}>
                          重新拍攝<input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoCapture} />
                        </label>
                      </div>
                    ) : (
                      <label className={`flex flex-col items-center justify-center w-full h-64 border-4 border-dashed border-${themeColor}-300 bg-white rounded-xl cursor-pointer hover:bg-${themeColor}-50 transition-all text-${themeColor}-600`}>
                        <svg className="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span className="font-bold text-lg md:text-xl">點擊開啟相機</span><input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoCapture} />
                      </label>
                    )}
                  </div>
                  
                  <div className={`bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200`}>
                    <h4 className={`font-bold text-slate-800 mb-4 text-lg border-l-4 border-${themeColor}-500 pl-3`}>📍 2. 在地圖標記發現位置</h4>
                    <div className={`relative w-full h-64 md:h-[450px] bg-[#f8fdfa] rounded-xl border-4 border-${themeColor}-300 cursor-crosshair overflow-hidden shadow-inner`} onClick={handleMapClick} style={{ backgroundImage: `url('${CAMPUS_MAP_URL}')`, backgroundSize: 'contain', backgroundRepeat: 'no-repeat', backgroundPosition: 'center' }}>
                      <div className="absolute inset-0 bg-black/5 hover:bg-transparent transition-all pointer-events-none flex items-start justify-center pt-4">
                        <span className={`bg-white/95 px-5 py-2 rounded-full text-sm md:text-base font-black text-slate-700 shadow-md border border-slate-200`}>點擊地圖標記發現動物的位置</span>
                      </div>
                      {activeTask.mapX !== null && (
                        <div className="absolute w-10 h-10 -ml-5 -mt-10 text-red-500 drop-shadow-lg transition-all duration-300 ease-out animate-bounce" style={{ left: `${activeTask.mapX}%`, top: `${activeTask.mapY}%` }}>
                          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        </div>
                      )}
                    </div>
                  </div>
                </>
              )}
              
              <div className={`bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200`}>
                <h4 className={`font-bold text-slate-800 mb-3 text-lg border-l-4 border-${themeColor}-500 pl-3`}>✅ {isNoPhotoCategory ? '1' : '3'}. 勾選判斷依據 (可複選)</h4>
                <p className={`text-sm md:text-base text-slate-600 mb-5 font-bold`}>請觀察動物的特徵，勾選它具備的條件：</p>
                <div className="flex flex-col gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                  {checklist.map((item, catIndex) => (
                    <div key={catIndex} className={`bg-white p-4 rounded-xl border border-slate-200 shadow-sm`}>
                      <div className={`font-bold text-${themeColor}-900 mb-3 md:text-lg border-b border-slate-100 pb-2`}>{item.title}</div>
                      <div className="flex flex-wrap gap-3">
                        {item.options.map((opt, optIndex) => {
                          const featureId = `${catIndex}-${optIndex}`;
                          const isSelected = (activeTask.selectedFeatures || []).includes(featureId);
                          return (
                            <label key={optIndex} className={`flex items-center gap-2 px-4 py-2 rounded-lg border-2 cursor-pointer transition-all ${isSelected ? `border-${themeColor}-500 bg-${themeColor}-100 text-${themeColor}-900 font-bold shadow-sm` : `border-slate-200 bg-white text-slate-600 hover:bg-slate-50 hover:border-${themeColor}-300`}`}>
                              <input type="checkbox" className={`w-5 h-5 text-${themeColor}-600 rounded border-slate-300 focus:ring-${themeColor}-500`} checked={isSelected} onChange={() => handleFeatureToggle(featureId)} />
                              <span className="text-sm md:text-base">{opt}</span>
                            </label>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function QuizTab({ theme }) {
      const isVert = theme === 'vert';
      const quizData = isVert ? VERT_QUIZ_DATA : INVERT_QUIZ_DATA;
      const storageKey = `animal_${theme}_quiz`;

      const [rawQuizState, setQuizState] = useLocalStorage(storageKey, null);
      
      // 極致防呆保護
      const quizState = (rawQuizState && typeof rawQuizState === 'object' && rawQuizState.answers) 
        ? rawQuizState 
        : { answers: {}, isSubmitted: false, score: 0 };
        
      const [quizMsg, setQuizMsg] = useState('');
      const [showConfirmReset, setShowConfirmReset] = useState(false);
      const themeColor = isVert ? 'blue' : 'amber';

      const handleOptionSelect = (qId, optionIndex) => {
        if (quizState.isSubmitted) return;
        setQuizState(prev => ({ ...prev, answers: { ...(prev?.answers || {}), [qId]: optionIndex } }));
      };

      const handleSubmit = () => {
        if (Object.keys(quizState.answers || {}).length < quizData.length) {
          setQuizMsg("還有題目未作答完畢喔！"); 
          setTimeout(() => setQuizMsg(''), 3000); 
          return;
        }
        let calculatedScore = 0;
        quizData.forEach(q => { if ((quizState.answers || {})[q.id] === q.answer) calculatedScore += 10; });
        setQuizState(prev => ({ ...prev, isSubmitted: true, score: calculatedScore }));
      };

      const handleConfirmReset = () => { 
        setQuizState({ answers: {}, isSubmitted: false, score: 0 }); 
        setShowConfirmReset(false); 
      };

      return (
        <div className="max-w-4xl mx-auto animate-fadeIn">
          <div className="flex justify-between items-center mb-6">
            <h2 className={`text-2xl md:text-3xl font-extrabold text-${themeColor}-900 flex items-center gap-2`}><span>📝</span> 實戰測驗</h2>
            {quizState.isSubmitted && <button onClick={() => setShowConfirmReset(true)} className={`text-${themeColor}-700 font-bold border-2 border-${themeColor}-200 hover:bg-${themeColor}-100 px-4 py-2 rounded-lg transition-colors bg-white shadow-sm`}>重新測驗</button>}
          </div>
          
          {showConfirmReset && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fadeIn">
              <div className="bg-white rounded-2xl p-6 shadow-xl text-center max-w-sm border border-slate-200">
                <h3 className="text-xl font-bold text-slate-800 mb-2">確定要重新測驗嗎？</h3>
                <p className="text-slate-600 mb-6 font-medium">這將會清除您在「{isVert ? '脊椎動物' : '無脊椎動物'}區」的成績。</p>
                <div className="flex gap-3 justify-center">
                  <button onClick={() => setShowConfirmReset(false)} className="px-6 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold hover:bg-slate-200 transition-colors">取消</button>
                  <button onClick={handleConfirmReset} className={`px-6 py-2 bg-${themeColor}-600 text-white rounded-lg font-bold hover:bg-${themeColor}-700 transition-colors shadow-md`}>確定重測</button>
                </div>
              </div>
            </div>
          )}

          {quizState.isSubmitted && (
            <div className={`mb-8 p-6 md:p-8 rounded-2xl text-center border-4 shadow-lg bg-white relative overflow-hidden ${quizState.score >= 80 ? 'border-green-400' : quizState.score >= 60 ? 'border-amber-400' : 'border-red-400'}`}>
              <div className={`absolute top-0 left-0 w-full h-2 ${quizState.score >= 80 ? 'bg-green-400' : quizState.score >= 60 ? 'bg-amber-400' : 'bg-red-400'}`}></div>
              <h3 className="text-2xl font-black text-slate-800 mb-2">測驗結果</h3>
              <div className="text-6xl md:text-7xl font-black mb-4">
                <span className={quizState.score >= 80 ? 'text-green-600' : quizState.score >= 60 ? 'text-amber-500' : 'text-red-500'}>{quizState.score}</span>
                <span className="text-3xl text-slate-400"> / 100</span>
              </div>
              <p className="text-lg md:text-xl font-bold text-slate-700">
                {quizState.score >= 80 ? '🎉 太棒了！您已經是動物小專家！' : quizState.score >= 60 ? '👍 表現不錯！再複習一下會更精熟喔！' : '💪 別氣餒，再看一次知識補給區吧！'}
              </p>
            </div>
          )}

          <div className="space-y-6">
            {quizData.map((q, index) => {
              const userAnswer = (quizState.answers || {})[q.id];
              const isCorrect = userAnswer === q.answer;
              return (
                <div key={q.id} className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-4 flex gap-3 leading-relaxed">
                    <span className={`text-${themeColor}-600 shrink-0 font-black`}>Q{index + 1}.</span> 
                    <span>{q.question}</span>
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                    {q.options.map((opt, optIdx) => {
                      let buttonClass = "p-3 md:p-4 rounded-xl border-2 text-left font-bold transition-all text-sm md:text-base ";
                      if (!quizState.isSubmitted) {
                        buttonClass += userAnswer === optIdx ? `border-${themeColor}-500 bg-${themeColor}-50 text-${themeColor}-800 shadow-sm` : `border-slate-200 hover:border-${themeColor}-400 hover:bg-slate-50 text-slate-700`;
                      } else {
                        if (optIdx === q.answer) buttonClass += "border-green-500 bg-green-50 text-green-800 shadow-sm";
                        else if (userAnswer === optIdx && !isCorrect) buttonClass += "border-red-400 bg-red-50 text-red-800 line-through opacity-80";
                        else buttonClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                      }
                      return (
                        <button key={optIdx} onClick={() => handleOptionSelect(q.id, optIdx)} disabled={quizState.isSubmitted} className={buttonClass}>
                          <span className="mr-2 opacity-70">{String.fromCharCode(65 + optIdx)}.</span> {opt}
                        </button>
                      );
                    })}
                  </div>
                  
                  {quizState.isSubmitted && (
                    <div className={`mt-5 pt-5 border-t border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4`}>
                      <div className={`flex-1 ${isCorrect ? 'bg-green-50 border-green-100 text-green-900' : 'bg-amber-50 border-amber-100 text-amber-900'} border p-4 rounded-xl text-sm md:text-base flex gap-3 leading-relaxed`}>
                        <span className="shrink-0 text-xl">{isCorrect ? '💡' : '📖'}</span>
                        <div>
                          <span className="font-black mb-1 block">解析：</span>
                          {q.explanation}
                        </div>
                      </div>
                      <div className="text-right shrink-0 w-full md:w-auto flex justify-end">
                        {isCorrect ? (
                          <div className="bg-green-600 text-white font-bold px-4 py-2 rounded-lg shadow-sm flex items-center gap-2"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg> 答對了</div>
                        ) : (
                          <div className="bg-red-500 text-white font-bold px-4 py-2 rounded-lg shadow-sm flex items-center gap-2"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg> 答錯了</div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          
          {quizMsg && <div className="mt-6 bg-red-100 text-red-600 p-3 rounded-lg font-bold text-center text-lg border border-red-200 animate-fadeIn">{quizMsg}</div>}
          
          {!quizState.isSubmitted && (
            <div className="mt-10 text-center pb-8">
              <button onClick={handleSubmit} className={`bg-${themeColor}-600 text-white px-12 py-4 rounded-full text-xl font-black shadow-lg hover:bg-${themeColor}-700 hover:shadow-xl transition-all transform hover:-translate-y-1`}>
                交卷看成績
              </button>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 🚀 第四階段：核心 App 與狀態管理區
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('knowledge');
      const [currentTheme, setCurrentTheme] = useState('invert'); 
      
      const [teamProfile, setTeamProfile] = useLocalStorage('animal_team_profile', null);
      const [showProfileModal, setShowProfileModal] = useState(false);
      const [user, setUser] = useState(null);
      
      const [isSyncing, setIsSyncing] = useState(false);
      const [isRestoring, setIsRestoring] = useState(false);
      const [syncMessage, setSyncMessage] = useState(null);

      const [showTeacherDashboard, setShowTeacherDashboard] = useState(false);
      const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);

      useEffect(() => {
        auth.signInAnonymously().catch(err => console.error("Firebase 登入失敗:", err));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => { if (!teamProfile) setShowProfileModal(true); }, [teamProfile]);

      const handleProfileSave = async (profileData) => {
        setIsRestoring(true);
        try {
          const recordId = `class${profileData.classId}_group${profileData.groupId}`;
          const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('animal_records').doc(recordId);
          const docSnap = await docRef.get();

          if (docSnap.exists) {
            const data = docSnap.data();
            if(data.invertState) {
              if(data.invertState.explorationTasks) window.localStorage.setItem('animal_invert_exploration', JSON.stringify(data.invertState.explorationTasks));
              if(data.invertState.quizState) window.localStorage.setItem('animal_invert_quiz', JSON.stringify(data.invertState.quizState));
              if(data.invertState.matchingState) window.localStorage.setItem('animal_invert_matching', JSON.stringify(data.invertState.matchingState));
            }
            if(data.vertState) {
              if(data.vertState.explorationTasks) window.localStorage.setItem('animal_vert_exploration', JSON.stringify(data.vertState.explorationTasks));
              if(data.vertState.quizState) window.localStorage.setItem('animal_vert_quiz', JSON.stringify(data.vertState.quizState));
              if(data.vertState.matchingState) window.localStorage.setItem('animal_vert_matching', JSON.stringify(data.vertState.matchingState));
            }
            setSyncMessage({ text: '🎉 成功載入您上次的動物探險進度！', type: 'success' });
          } else {
            ['invert', 'vert'].forEach(theme => {
              window.localStorage.removeItem(`animal_${theme}_exploration`);
              window.localStorage.removeItem(`animal_${theme}_quiz`);
              window.localStorage.removeItem(`animal_${theme}_matching`);
            });
            setSyncMessage({ text: '建立全新動物探究任務！', type: 'success' });
          }
        } catch (err) {
          console.error("還原失敗", err);
          setSyncMessage({ text: '無法連線至雲端，將開啟本機新任務。', type: 'error' });
        } finally {
          setTeamProfile(profileData);
          setIsRestoring(false);
          setShowProfileModal(false);
          setTimeout(() => setSyncMessage(null), 3500);
        }
      };

      const handleLogout = () => setShowLogoutConfirm(true);

      const executeLogout = () => {
        window.localStorage.removeItem('animal_team_profile');
        ['invert', 'vert'].forEach(theme => {
          window.localStorage.removeItem(`animal_${theme}_exploration`);
          window.localStorage.removeItem(`animal_${theme}_quiz`);
          window.localStorage.removeItem(`animal_${theme}_matching`);
        });
        setTeamProfile(null);
        setActiveTab('knowledge');
        setCurrentTheme('invert');
        setShowLogoutConfirm(false);
        setShowProfileModal(true);
      };

      const handleSyncToCloud = async () => {
        if (!user) { setSyncMessage({ text: '尚未連線至雲端伺服器，請稍候。', type: 'error' }); setTimeout(() => setSyncMessage(null), 3000); return; }
        if (!teamProfile) { setSyncMessage({ text: '請先完成小組報到！', type: 'error' }); setTimeout(() => setSyncMessage(null), 3000); return; }
        
        setIsSyncing(true); 
        setSyncMessage({ text: '正在將兩大動物區進度上傳至雲端...', type: 'info' });
        
        try {
          const getLocal = (key) => { const r = window.localStorage.getItem(key); return (r && r !== "undefined") ? JSON.parse(r) : null; };
          const invertState = {
            explorationTasks: getLocal('animal_invert_exploration') || INVERT_CATEGORIES.map(c => ({ categoryName: c.name, photo: null, mapX: null, mapY: null, selectedFeatures: [] })),
            quizState: getLocal('animal_invert_quiz') || { answers: {}, isSubmitted: false, score: 0 },
            matchingState: getLocal('animal_invert_matching') || { unmatchedIds: INVERT_FEATURES_DATA.map(f=>f.id), matchedRecords: [] }
          };
          
          const vertState = {
            explorationTasks: getLocal('animal_vert_exploration') || VERT_CATEGORIES.map(c => ({ categoryName: c.name, photo: null, mapX: null, mapY: null, selectedFeatures: [] })),
            quizState: getLocal('animal_vert_quiz') || { answers: {}, isSubmitted: false, score: 0 },
            matchingState: getLocal('animal_vert_matching') || { unmatchedIds: VERT_FEATURES_DATA.map(f=>f.id), matchedRecords: [] }
          };

          const recordId = `class${teamProfile.classId}_group${teamProfile.groupId}`;
          
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('animal_records').doc(recordId).set({
            teamProfile, 
            invertState,
            vertState,
            lastUpdated: new Date().toLocaleString('zh-TW')
          });

          setSyncMessage({ text: '🎉 資料同步成功！下課前請記得按登出。', type: 'success' });
        } catch (error) {
          console.error("同步失敗:", error); setSyncMessage({ text: '同步失敗，請檢查網路狀態。', type: 'error' });
        } finally {
          setIsSyncing(false); setTimeout(() => setSyncMessage(null), 4000);
        }
      };

      return (
        <div className={`min-h-screen font-sans text-slate-800 transition-colors duration-500 ${currentTheme === 'invert' ? 'bg-amber-50 selection:bg-amber-200 theme-invert' : 'bg-blue-50 selection:bg-blue-200 theme-vert'}`}>
          
          {showLogoutConfirm && (
            <div className="fixed inset-0 z-[120] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fadeIn">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden text-center p-6 border border-slate-200">
                <h3 className="text-xl font-bold text-red-600 mb-2">確定要登出嗎？</h3>
                <p className="text-slate-600 mb-6 text-sm md:text-base font-bold">這將清空這台平板的暫存資料。<br/>請確認剛剛已經「同步雲端」，否則進度會遺失喔！</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-2 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 shadow-sm border border-slate-200">取消</button>
                  <button onClick={executeLogout} className="flex-1 py-2 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 shadow-sm border border-red-700">確定登出</button>
                </div>
              </div>
            </div>
          )}

          {showTeacherDashboard && <TeacherDashboard onClose={() => setShowTeacherDashboard(false)} db={db} appId={appId} currentClassId={teamProfile?.classId} />}
          {syncMessage && <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-[60] px-6 py-3 rounded-full shadow-lg text-lg font-bold text-white transition-all animate-fadeIn ${syncMessage.type === 'success' ? 'bg-green-500' : syncMessage.type === 'error' ? 'bg-red-500' : 'bg-slate-700'}`}>{syncMessage.text}</div>}
          {showProfileModal && <TeamProfileModal profile={teamProfile} onSave={handleProfileSave} onCancel={() => setShowProfileModal(false)} canCancel={teamProfile !== null} isRestoring={isRestoring} />}
          
          <header className={`text-white shadow-md transition-colors duration-500 ${currentTheme === 'invert' ? 'bg-amber-600' : 'bg-blue-700'}`}>
            <div className="max-w-6xl mx-auto px-4 py-6 md:py-8 flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="text-center md:text-left flex items-center gap-3">
                <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-sm shadow-inner text-3xl md:text-4xl">{currentTheme === 'invert' ? '🐛' : '🦖'}</div>
                <div>
                  <h1 className="text-3xl md:text-4xl font-black tracking-wide drop-shadow-sm">國中動物界探究學習網</h1>
                  <p className="text-white/80 mt-1 text-sm md:text-base font-bold tracking-wide">觀察、辨識、探索，成為校園動物達人！</p>
                </div>
              </div>
              
              {teamProfile && (
                <div className="flex flex-col md:flex-row items-end md:items-center gap-3">
                  <div className={`border rounded-xl p-3 flex items-center gap-4 shadow-inner backdrop-blur-sm ${currentTheme === 'invert' ? 'bg-amber-800/40 border-amber-500' : 'bg-blue-900/40 border-blue-500'}`}>
                    <div className="text-right">
                      <div className="font-black tracking-wider text-white">
                        {teamProfile.classId} 班 - {teamProfile.groupId === 99 ? '老師組' : `第 ${teamProfile.groupId} 組`}
                      </div>
                      <div className="text-sm mt-0.5 text-white/80 font-bold">座號：{Array.isArray(teamProfile.seatNumbers) ? teamProfile.seatNumbers.join(', ') : ''}</div>
                    </div>
                    <div className="flex gap-2">
                      {teamProfile.groupId === 99 && (
                        <button onClick={() => setShowTeacherDashboard(true)} className="bg-indigo-500 hover:bg-indigo-400 text-white p-2 rounded-lg transition-colors shadow-sm border border-indigo-400 flex items-center gap-1" title="開啟教師後台">
                          <span className="text-xl leading-none">👨‍🏫</span><span className="hidden md:inline font-bold text-sm">後台</span>
                        </button>
                      )}
                      <button onClick={() => setShowProfileModal(true)} className={`p-2 rounded-lg transition-colors shadow-sm border text-white ${currentTheme === 'invert' ? 'bg-amber-500 hover:bg-amber-400 border-amber-400' : 'bg-blue-600 hover:bg-blue-500 border-blue-400'}`} title="修改小組資訊">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                      </button>
                      <button onClick={handleLogout} className="bg-red-500/90 hover:bg-red-500 text-white p-2 rounded-lg transition-colors shadow-sm border border-red-400" title="登出並清空這台平板資料">
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                      </button>
                    </div>
                  </div>
                  <button onClick={handleSyncToCloud} disabled={isSyncing} className={`flex items-center gap-2 px-4 py-3 rounded-xl font-bold shadow-md transition-all h-full ${isSyncing ? 'bg-slate-400 text-slate-100 cursor-not-allowed border border-slate-500' : 'bg-slate-800 hover:bg-slate-700 text-white hover:-translate-y-1 border border-slate-600'}`}>
                    {isSyncing ? <svg className="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>}
                    <span>{isSyncing ? '上傳中...' : '同步雲端'}</span>
                  </button>
                </div>
              )}
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 relative z-10 flex flex-col mt-[-20px] pb-12">
            <ThemeToggle currentTheme={currentTheme} onThemeChange={setCurrentTheme} />

            <div className="flex bg-white rounded-t-2xl shadow-md border-b border-slate-200 overflow-hidden mt-2 z-10">
              <TabButton theme={currentTheme} id="knowledge" activeTab={activeTab} setActiveTab={setActiveTab} label="知識補給" icon={<svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>} />
              <TabButton theme={currentTheme} id="matching" activeTab={activeTab} setActiveTab={setActiveTab} label="特徵配對" icon={<svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"/></svg>} />
              <TabButton theme={currentTheme} id="exploration" activeTab={activeTab} setActiveTab={setActiveTab} label="校園尋寶" icon={<svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg>} />
              <TabButton theme={currentTheme} id="quiz" activeTab={activeTab} setActiveTab={setActiveTab} label="實戰測驗" icon={<svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>} />
            </div>
            
            <div className={`bg-white rounded-b-2xl shadow-lg border border-slate-200 p-4 md:p-8 min-h-[60vh] transition-all duration-300 relative overflow-hidden`} key={currentTheme}>
              <div className={`absolute top-0 left-0 w-full h-1 ${currentTheme === 'invert' ? 'bg-amber-400' : 'bg-blue-500'}`}></div>
              {activeTab === 'knowledge' && <KnowledgeTab theme={currentTheme} />}
              {activeTab === 'matching' && <MatchingTab theme={currentTheme} />}
              {activeTab === 'exploration' && <ExplorationTab theme={currentTheme} />}
              {activeTab === 'quiz' && <QuizTab theme={currentTheme} />}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
